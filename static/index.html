<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMER Leadership Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <span class="logo">⚡</span>
                <h1>AMER Leadership Dashboard</h1>
            </div>
            <div class="header-right">
                <button class="btn btn-primary" onclick="showAddTask()">+ New Task</button>
                <span class="user-info">
                    <span class="status-dot"></span>
                    <span id="last-update">Updated: -</span>
                </span>
                <span class="user-badge">✓ Joe</span>
            </div>
        </header>

        <!-- Agent Status -->
        <div class="agent-status">
            <span class="status-indicator idle"></span>
            <span>Regi is <strong id="agent-status">idle</strong></span>
        </div>

        <!-- Top Actions -->
        <div class="top-actions">
            <button class="action-btn"><span class="icon">📊</span> Predictive Forecast</button>
            <button class="action-btn"><span class="icon">🔍</span> Pipeline Review</button>
        </div>

        <!-- Main Tabs -->
        <nav class="tabs">
            <button class="tab active" data-tab="tasks"><span class="tab-icon">📋</span> Tasks</button>
            <button class="tab" data-tab="agents"><span class="tab-icon">🤖</span> Agents</button>
            <button class="tab" data-tab="cron"><span class="tab-icon">⏰</span> Cron Jobs</button>
            <button class="tab" data-tab="activity"><span class="tab-icon">📈</span> Activity Log</button>
            <button class="tab" data-tab="meddpicc"><span class="tab-icon">🎯</span> MEDDPICC</button>
            <button class="tab" data-tab="coaching"><span class="tab-icon">🎓</span> Coaching</button>
            <button class="tab" data-tab="battlecards"><span class="tab-icon">⚔️</span> Battlecards</button>
            <button class="tab" data-tab="scorecards"><span class="tab-icon">🏆</span> Scorecards</button>
            <button class="tab" data-tab="weekly"><span class="tab-icon">📅</span> Weekly</button>
            <button class="tab" data-tab="pipeline"><span class="tab-icon">💰</span> Pipeline</button>
        </nav>

        <!-- Tab Content -->
        <div class="tab-content">
            <!-- Tasks Tab -->
            <div id="tasks-tab" class="tab-pane active">
                <div class="tasks-toolbar">
                    <input type="text" class="search-input" placeholder="🔍 Search tasks...">
                    <select class="filter-select">
                        <option>All Tasks</option>
                        <option>My Tasks</option>
                        <option>Unassigned</option>
                    </select>
                    <button class="btn btn-primary" onclick="showAddTask()">+ Add Task</button>
                    <label class="checkbox-label">
                        <input type="checkbox" id="show-completed"> Show Completed
                    </label>
                </div>

                <!-- Priority Summary -->
                <div class="priority-summary">
                    <div class="priority-box p1">
                        <div class="priority-label">P1 — THIS WEEK</div>
                        <div class="priority-count" id="p1-count">0</div>
                    </div>
                    <div class="priority-box p2">
                        <div class="priority-label">P2 — THIS MONTH</div>
                        <div class="priority-count" id="p2-count">0</div>
                    </div>
                    <div class="priority-box p3">
                        <div class="priority-label">P3 — QUARTER</div>
                        <div class="priority-count" id="p3-count">0</div>
                    </div>
                    <div class="priority-box p4">
                        <div class="priority-label">COMPLETED</div>
                        <div class="priority-count" id="p4-count">0</div>
                    </div>
                </div>

                <!-- Kanban Board -->
                <div class="kanban-board">
                    <div class="kanban-column" data-priority="p1">
                        <div class="column-header">
                            <span class="dot p1"></span> P1 — This Week
                            <button class="add-btn" onclick="showAddTask('p1')">+</button>
                        </div>
                        <div class="task-list" id="p1-tasks"></div>
                    </div>
                    <div class="kanban-column" data-priority="p2">
                        <div class="column-header">
                            <span class="dot p2"></span> P2 — This Month
                            <button class="add-btn" onclick="showAddTask('p2')">+</button>
                        </div>
                        <div class="task-list" id="p2-tasks"></div>
                    </div>
                    <div class="kanban-column" data-priority="p3">
                        <div class="column-header">
                            <span class="dot p3"></span> P3 — Quarter
                            <button class="add-btn" onclick="showAddTask('p3')">+</button>
                        </div>
                        <div class="task-list" id="p3-tasks"></div>
                    </div>
                    <div class="kanban-column" data-priority="completed">
                        <div class="column-header">
                            <span class="dot p4"></span> Completed
                        </div>
                        <div class="task-list" id="completed-tasks"></div>
                    </div>
                </div>
            </div>

            <!-- Agents Tab -->
            <div id="agents-tab" class="tab-pane">
                <div class="agents-grid" id="agents-list"></div>
            </div>

            <!-- Cron Jobs Tab -->
            <div id="cron-tab" class="tab-pane">
                <div class="cron-list" id="cron-list"></div>
            </div>

            <!-- Activity Log Tab -->
            <div id="activity-tab" class="tab-pane">
                <div class="activity-list" id="activity-list"></div>
            </div>

            <!-- MEDDPICC Tab -->
            <div id="meddpicc-tab" class="tab-pane">
                <div class="meddpicc-grid" id="meddpicc-content"></div>
            </div>

            <!-- Coaching Tab -->
            <div id="coaching-tab" class="tab-pane">
                <div class="coaching-content" id="coaching-content"></div>
            </div>

            <!-- Battlecards Tab -->
            <div id="battlecards-tab" class="tab-pane">
                <div class="battlecards-grid" id="battlecards-content"></div>
            </div>

            <!-- Scorecards Tab -->
            <div id="scorecards-tab" class="tab-pane">
                <div class="scorecards-content" id="scorecards-content"></div>
            </div>

            <!-- Weekly Tab -->
            <div id="weekly-tab" class="tab-pane">
                <div class="weekly-content" id="weekly-content"></div>
            </div>

            <!-- Pipeline Tab -->
            <div id="pipeline-tab" class="tab-pane">
                <div class="pipeline-content" id="pipeline-content"></div>
            </div>
        </div>

        <!-- Add Task Modal -->
        <div id="task-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>New Task</h2>
                    <button class="close-btn" onclick="closeModal()">&times;</button>
                </div>
                <form id="task-form" onsubmit="saveTask(event)">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="task-title" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="task-desc"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Priority</label>
                            <select id="task-priority">
                                <option value="p1">P1 — This Week</option>
                                <option value="p2">P2 — This Month</option>
                                <option value="p3">P3 — Quarter</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Impact</label>
                            <select id="task-impact">
                                <option value="L">L Impact</option>
                                <option value="M" selected>M Impact</option>
                                <option value="S">S Impact</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Assignee</label>
                        <input type="text" id="task-assignee" placeholder="@name">
                    </div>
                    <div class="form-group">
                        <label>Tags (comma separated)</label>
                        <input type="text" id="task-tags" placeholder="ops, tools, AI">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create Task</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
